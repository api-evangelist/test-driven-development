vocabulary: "1.0.0"

info:
  provider: Test-Driven Development
  description: Vocabulary and taxonomy for test-driven development covering TDD cycles, code coverage, and test specification concepts.
  created: "2026-05-03"
  modified: "2026-05-03"

operational:
  resources:
    - name: tdd-cycles
      description: Individual red-green-refactor TDD iterations tracking test writing and implementation.
      actions: [create, read, list]
    - name: coverage-reports
      description: Code coverage reports generated after running TDD test suites.
      actions: [create, read, list]
    - name: test-specs
      description: Executable test specifications defining expected behavior before implementation.
      actions: [create, read, update, delete, list, run]

  actions:
    - name: create
      description: Create a new TDD cycle record, coverage report, or test spec.
      http_methods: [POST]
      pattern: write
    - name: read
      description: Retrieve a specific TDD artifact by identifier.
      http_methods: [GET]
      pattern: read
    - name: list
      description: List TDD cycles, reports, or specs with filtering.
      http_methods: [GET]
      pattern: read
    - name: run
      description: Execute a test specification.
      http_methods: [POST]
      pattern: write
    - name: update
      description: Update a test specification.
      http_methods: [PUT, PATCH]
      pattern: write
    - name: delete
      description: Remove a test specification.
      http_methods: [DELETE]
      pattern: destructive

  schemas:
    core:
      - name: TDDCycle
        description: A single red-green-refactor TDD iteration.
        key_properties: [id, phase, test_name, test_status, language, framework]
      - name: CoverageReport
        description: Code coverage statistics for a project build.
        key_properties: [id, project, commit_hash, summary, generated_at]
      - name: TestSpec
        description: Executable test specification written before implementation.
        key_properties: [id, name, it_should, describe, context, status]

  enums:
    tdd_phase:
      - red
      - green
      - refactor
    test_status:
      - failing
      - passing
    spec_status:
      - pending
      - passing
      - failing
      - skipped
    assertion_type:
      - equals
      - contains
      - matches
      - throws
      - resolves
      - rejects

  parameters:
    identifiers:
      - name: id
        description: Unique identifier for the TDD artifact.
        type: string
      - name: commit_hash
        description: Git commit hash.
        type: string
    filters:
      - name: phase
        description: Filter TDD cycles by phase.
        type: string
      - name: language
        description: Filter by programming language.
        type: string
      - name: framework
        description: Filter by testing framework.
        type: string
      - name: branch
        description: Filter coverage reports by git branch.
        type: string
    pagination:
      - name: limit
        description: Maximum number of results per page.
        type: integer
      - name: offset
        description: Number of results to skip.
        type: integer

  authentication:
    schemes:
      - type: bearer
        description: Bearer token for CI/CD and coverage service APIs.

capability:
  workflows: []
  personas:
    - id: developer
      name: Developer
      description: Software developer practicing TDD to write tests before implementation.
    - id: tech-lead
      name: Tech Lead
      description: Senior developer ensuring TDD practices and coverage standards are maintained.
    - id: ci-system
      name: CI System
      description: Automated continuous integration system running TDD suites and reporting coverage.
  domains:
    - name: Test Writing
      description: Writing failing tests that specify the desired behavior before implementation.
    - name: Implementation
      description: Writing minimal code to make failing tests pass.
    - name: Refactoring
      description: Improving code quality while keeping tests passing.
    - name: Coverage Analysis
      description: Measuring and tracking test coverage metrics over time.
  namespaces: []
  binds: []

crossReference:
  - resource: tdd-cycles
    operations: [create, read, list]
    workflows: []
    personas: [developer, tech-lead]
  - resource: coverage-reports
    operations: [create, read, list]
    workflows: []
    personas: [developer, tech-lead, ci-system]
  - resource: test-specs
    operations: [create, read, update, delete, list, run]
    workflows: []
    personas: [developer]
